name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v0.1.0"
        required: true
        type: string
      publish:
        description: "Publish wheels to PyPI"
        required: true
        default: false
        type: boolean
      publish_crates:
        description: "Publish Rust crates to crates.io"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create tag if needed
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          git fetch --tags origin
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-wheels:
    name: Wheels ${{ matrix.os }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            manylinux: "2014"
          - os: macos-latest
            manylinux: ""
          - os: windows-latest
            manylinux: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features extension-module --out dist
          manylinux: ${{ matrix.manylinux }}
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*

  build-sdist:
    name: Source Distribution
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  github-release:
    name: GitHub Release
    needs: [prepare-release, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true
      - name: Generate release notes
        shell: bash
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          previous_tag="$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..${TAG}"
            changelog="https://github.com/${REPOSITORY}/compare/${previous_tag}...${TAG}"
          else
            range="${TAG}"
            changelog="https://github.com/${REPOSITORY}/commits/${TAG}"
          fi

          {
            echo "## What's Changed"
            echo
            first_commit="$(git log --no-merges --format=%H -n 1 "$range" || true)"
            if [[ -n "$first_commit" ]]; then
              while IFS=$'\t' read -r subject author sha; do
                echo "- ${subject} by ${author} in [${sha}](https://github.com/${REPOSITORY}/commit/${sha})"
              done < <(git log --no-merges --reverse --format=$'%s\t%an\t%h' "$range")
            else
              echo "- Release ${TAG}"
            fi

            if [[ -n "$previous_tag" ]]; then
              mapfile -t new_contributors < <(
                git log --no-merges --format=$'%ae\t%an' "$range" \
                  | sort -u \
                  | while IFS=$'\t' read -r email name; do
                      if [[ -n "$email" ]] && ! git log --format=%ae "$previous_tag" | grep -Fxq "$email"; then
                        printf '%s\n' "$name"
                      fi
                    done \
                  | sort -u
              )

              if [[ "${#new_contributors[@]}" -gt 0 ]]; then
                echo
                echo "## New Contributors"
                echo
                for name in "${new_contributors[@]}"; do
                  echo "- ${name} made their first contribution"
                done
              fi
            fi

            echo
            echo "**Full Changelog**: ${changelog}"
          } > RELEASE_NOTES.md

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: dist/*

  publish-pypi:
    name: Publish PyPI
    if: github.event_name == 'push' || inputs.publish
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-crates:
    name: Publish crates.io
    if: github.event_name == 'push' || inputs.publish_crates
    needs: [prepare-release, github-release]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - name: Publish vad-burn
        run: cargo publish -p vad-burn
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
